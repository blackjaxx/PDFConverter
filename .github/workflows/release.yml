name: Build and Release DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: |
          brew install poppler qpdf ghostscript tesseract libreoffice 2>&1 || true
          brew install poppler qpdf ghostscript tesseract 2>&1

      - name: Bundle CLI tools
        run: |
          chmod +x Scripts/bundle-tools.sh
          ./Scripts/bundle-tools.sh

      - name: Build app (Release)
        run: |
          mkdir -p build
          xcodebuild build \
            -project PDFConverter.xcodeproj \
            -scheme PDFConverter \
            -configuration Release \
            -derivedDataPath build/derivedData \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            > build/build.log 2>&1 || {
              echo "=== BUILD FAILED (last 150 lines) ==="
              tail -150 build/build.log
              exit 1
            }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build/build.log

      - name: Extract .app from build products
        if: success()
        run: |
          APP_PATH="build/derivedData/Build/Products/Release/PDFConverter.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found at $APP_PATH"
            find build/derivedData -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          mkdir -p export
          cp -R "$APP_PATH" export/

      - name: Create DMG
        if: success()
        run: |
          APP_NAME="PDFConverter"
          DMG_NAME="${APP_NAME}-${GITHUB_REF_NAME}.dmg"
          STAGING_DIR="dmg_staging"
          mkdir -p "${STAGING_DIR}"
          cp -R "export/${APP_NAME}.app" "${STAGING_DIR}/"
          ln -s /Applications "${STAGING_DIR}/Applications"
          hdiutil create -volname "PDF Converter" -srcfolder "${STAGING_DIR}" -ov -format UDZO "${DMG_NAME}"
          ls -lh "${DMG_NAME}"

      - name: Upload DMG to Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: "PDFConverter-*.dmg"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}