name: Build and Release DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: |
          brew install poppler qpdf ghostscript tesseract 2>&1

      - name: Bundle CLI tools
        run: |
          chmod +x Scripts/bundle-tools.sh
          ./Scripts/bundle-tools.sh

      - name: Build app (Release)
        run: |
          set -o pipefail
          echo "=== Xcode version ==="
          xcodebuild -version
          echo "=== Swift version ==="
          swift --version
          echo "=== Available SDKs ==="
          xcodebuild -showsdks
          echo "=== Building ==="
          mkdir -p build
          xcodebuild build \
            -project PDFConverter.xcodeproj \
            -scheme PDFConverter \
            -configuration Release \
            -derivedDataPath build/derivedData \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build/build.log | tail -80 || {
              echo "=== BUILD FAILED ==="
              exit 1
            }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build/build.log

      - name: Extract .app from build products
        if: success()
        run: |
          APP_PATH="build/derivedData/Build/Products/Release/PDFConverter.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found at $APP_PATH"
            find build/derivedData -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          mkdir -p export
          cp -R "$APP_PATH" export/

      - name: Verify bundled tools
        if: success()
        run: |
          TOOLS_DIR="export/PDFConverter.app/Contents/Resources/tools"
          echo "--- Verifying bundled CLI tools ---"
          FAILED=0
          for tool_path in \
            "$TOOLS_DIR/poppler/pdftoppm" \
            "$TOOLS_DIR/poppler/pdftotext" \
            "$TOOLS_DIR/qpdf/qpdf" \
            "$TOOLS_DIR/ghostscript/gs" \
            "$TOOLS_DIR/tesseract/tesseract"; do
            name=$(basename "$tool_path")
            echo -n "  $name ... "
            if "$tool_path" --version >/dev/null 2>&1 || "$tool_path" -version >/dev/null 2>&1 || "$tool_path" version >/dev/null 2>&1; then
              echo "OK"
            else
              echo "WARN (dyld issue?)"
              echo "--- stderr from tool: ---"
              "$tool_path" --version 2>&1 || true
              "$tool_path" -version 2>&1 || true
              "$tool_path" version 2>&1 || true
              echo "--- otool deps: ---"
              otool -L "$tool_path" | grep -iE '(homebrew|not found|@executable|@rpath)' || true
              FAILED=1
            fi
          done
          echo ""
          if [ $FAILED -eq 1 ]; then
            echo "=== TOOLS FAILED — aborting build ==="
            echo "=== Tool tree files: ==="
            find "$TOOLS_DIR" -type f | sort
            exit 1
          else
            echo "All tools verified OK."
          fi

      - name: Create DMG
        if: success()
        run: |
          APP_NAME="PDFConverter"
          DMG_NAME="${APP_NAME}-${GITHUB_REF_NAME}.dmg"
          STAGING_DIR="dmg_staging"
          mkdir -p "${STAGING_DIR}"
          cp -R "export/${APP_NAME}.app" "${STAGING_DIR}/"
          ln -s /Applications "${STAGING_DIR}/Applications"
          hdiutil create -volname "PDF Converter" -srcfolder "${STAGING_DIR}" -ov -format UDZO "${DMG_NAME}"
          ls -lh "${DMG_NAME}"

      - name: Upload DMG to Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: "PDFConverter-*.dmg"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}