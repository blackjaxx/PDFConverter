name: Build and Release DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: |
          brew install poppler qpdf ghostscript tesseract libreoffice 2>&1 || true
          brew install poppler qpdf ghostscript tesseract 2>&1

      - name: Bundle CLI tools
        run: |
          chmod +x Scripts/bundle-tools.sh
          ./Scripts/bundle-tools.sh

      - name: Build app (Release)
        run: |
          set -o pipefail
          xcodebuild build \
            -project PDFConverter.xcodeproj \
            -scheme PDFConverter \
            -configuration Release \
            -derivedDataPath build/derivedData \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -200

      - name: Extract .app from build products
        run: |
          APP_PATH="build/derivedData/Build/Products/Release/PDFConverter.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found at $APP_PATH"
            echo "Searching for .app..."
            find build/derivedData -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi

          mkdir -p export
          cp -R "$APP_PATH" export/
          echo ".app extracted successfully"

      - name: Create DMG
        run: |
          APP_NAME="PDFConverter"
          VOLUME_NAME="PDF Converter"
          DMG_NAME="${APP_NAME}-${GITHUB_REF_NAME}.dmg"
          STAGING_DIR="dmg_staging"

          mkdir -p "${STAGING_DIR}"
          cp -R "export/${APP_NAME}.app" "${STAGING_DIR}/"
          ln -s /Applications "${STAGING_DIR}/Applications"

          hdiutil create \
            -volname "${VOLUME_NAME}" \
            -srcfolder "${STAGING_DIR}" \
            -ov \
            -format UDZO \
            "${DMG_NAME}"

          echo "DMG created: ${DMG_NAME}"
          ls -lh "${DMG_NAME}"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "PDFConverter-*.dmg"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}