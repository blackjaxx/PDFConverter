name: Build and Release DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: |
          brew install poppler qpdf ghostscript tesseract 2>&1

      - name: Bundle CLI tools
        run: |
          bash Scripts/bundle-tools.sh
          echo "=== Bundled tools listing ==="
          find Resources/tools -type f -o -type l | sort

      - name: Build app (Release)
        run: |
          set -o pipefail
          echo "=== Xcode version ==="
          xcodebuild -version
          echo "=== Swift version ==="
          swift --version
          echo "=== Available SDKs ==="
          xcodebuild -showsdks
          echo "=== Building ==="
          mkdir -p build
          xcodebuild build \
            -project PDFConverter.xcodeproj \
            -scheme PDFConverter \
            -configuration Release \
            -derivedDataPath build/derivedData \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build/build.log | tail -80 || {
              echo "=== BUILD FAILED ==="
              exit 1
            }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build/build.log

      - name: Extract .app from build products
        if: success()
        run: |
          APP_PATH="build/derivedData/Build/Products/Release/PDFConverter.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found at $APP_PATH"
            find build/derivedData -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          mkdir -p export
          cp -R "$APP_PATH" export/

      - name: Diagnose bundled tools
        if: success()
        run: |
          TOOLS_DIR="export/PDFConverter.app/Contents/Resources/tools"
          DIAG_FILE="diagnostics/tools-otool.txt"
          mkdir -p diagnostics
          {
            echo "=== Tool tree ==="
            find "$TOOLS_DIR" -type f -o -type l | sort
            echo ""
            echo "=== otool -L for all binaries ==="
            find "$TOOLS_DIR" -type f \( -perm /0111 -o -name '*.dylib' \) -print0 2>/dev/null | while IFS= read -r -d '' f; do
              echo "--- $(basename "$f") [$(dirname "$f" | sed "s|$TOOLS_DIR/||")] ---"
              otool -L "$f" 2>/dev/null || echo "  (otool failed)"
              echo ""
            done
            echo "=== LC_RPATH for all binaries ==="
            find "$TOOLS_DIR" -type f \( -perm /0111 -o -name '*.dylib' \) -print0 2>/dev/null | while IFS= read -r -d '' f; do
              echo "--- $(basename "$f") [$(dirname "$f" | sed "s|$TOOLS_DIR/||")] ---"
              otool -l "$f" 2>/dev/null | grep -A2 'LC_RPATH' || echo "  (no LC_RPATH)"
              echo ""
            done
          } > "$DIAG_FILE" 2>&1
          echo "Diagnostics written to $DIAG_FILE"

      - name: Upload tools diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tools-diagnostics
          path: diagnostics/

      - name: Verify bundled tools
        if: success()
        continue-on-error: true
        run: |
          TOOLS_DIR="export/PDFConverter.app/Contents/Resources/tools"
          VERIFY_FILE="diagnostics/verify-output.txt"
          {
            echo "--- Verifying bundled CLI tools ---"
            echo "=== Directory structure ==="
            find "$TOOLS_DIR" -type f | sort
            echo "=== Dylib count ==="
            find "$TOOLS_DIR" -name '*.dylib' | wc -l
            echo ""
            FAILED=0
            export TESSDATA_PREFIX="$TOOLS_DIR/tesseract/"

            for tool_path in \
              "$TOOLS_DIR/poppler/pdftoppm" \
              "$TOOLS_DIR/poppler/pdftotext" \
              "$TOOLS_DIR/qpdf/qpdf" \
              "$TOOLS_DIR/ghostscript/gs" \
              "$TOOLS_DIR/tesseract/tesseract"; do
              name=$(basename "$tool_path")
              tool_dir=$(dirname "$tool_path")
              lib_path="$tool_dir:$TOOLS_DIR/poppler:$TOOLS_DIR/qpdf:$TOOLS_DIR/ghostscript:$TOOLS_DIR/tesseract:/usr/local/lib:/lib:/usr/lib"
              echo -n "  $name ... "
              if DYLD_LIBRARY_PATH="$tool_dir" DYLD_FALLBACK_LIBRARY_PATH="$lib_path" "$tool_path" --version >/dev/null 2>&1 || \
                 DYLD_LIBRARY_PATH="$tool_dir" DYLD_FALLBACK_LIBRARY_PATH="$lib_path" "$tool_path" -version >/dev/null 2>&1 || \
                 DYLD_LIBRARY_PATH="$tool_dir" DYLD_FALLBACK_LIBRARY_PATH="$lib_path" "$tool_path" version >/dev/null 2>&1; then
                echo "OK"
              elif [ "$name" = "tesseract" ] && DYLD_LIBRARY_PATH="$tool_dir" DYLD_FALLBACK_LIBRARY_PATH="$lib_path" "$tool_path" --list-langs >/dev/null 2>&1; then
                echo "OK (via --list-langs)"
              elif [ "$name" = "tesseract" ] && DYLD_LIBRARY_PATH="$tool_dir" DYLD_FALLBACK_LIBRARY_PATH="$lib_path" "$tool_path" -v >/dev/null 2>&1; then
                echo "OK (via -v)"
              else
                echo "WARN"
                echo "--- stderr from tool: ---"
                DYLD_LIBRARY_PATH="$tool_dir" DYLD_FALLBACK_LIBRARY_PATH="$lib_path" "$tool_path" --version 2>&1 || true
                DYLD_LIBRARY_PATH="$tool_dir" DYLD_FALLBACK_LIBRARY_PATH="$lib_path" "$tool_path" -version 2>&1 || true
                DYLD_LIBRARY_PATH="$tool_dir" DYLD_FALLBACK_LIBRARY_PATH="$lib_path" "$tool_path" version 2>&1 || true
                if [ "$name" = "tesseract" ]; then
                  DYLD_LIBRARY_PATH="$tool_dir" DYLD_FALLBACK_LIBRARY_PATH="$lib_path" "$tool_path" --list-langs 2>&1 || true
                  DYLD_LIBRARY_PATH="$tool_dir" DYLD_FALLBACK_LIBRARY_PATH="$lib_path" "$tool_path" -v 2>&1 || true
                fi
                echo "--- otool deps (full): ---"
                otool -L "$tool_path" || true
                echo "--- LC_RPATH entries: ---"
                otool -l "$tool_path" | grep -A2 'LC_RPATH' || true
                FAILED=1
              fi
            done
            echo ""
            if [ $FAILED -eq 1 ]; then
              echo "=== WARNING: Some tools failed verification ==="
              echo "=== Full tool tree with sizes: ==="
              ls -lR "$TOOLS_DIR"
              echo "=== DYLD_FALLBACK_LIBRARY_PATH was set to: $lib_path ==="
            else
              echo "All tools verified OK."
            fi
          } > "$VERIFY_FILE" 2>&1
          cat "$VERIFY_FILE"

      - name: Create DMG
        if: success() || failure()
        run: |
          APP_NAME="PDFConverter"
          DMG_NAME="${APP_NAME}-${GITHUB_REF_NAME}.dmg"
          STAGING_DIR="dmg_staging"
          mkdir -p "${STAGING_DIR}"
          if [ ! -d "export/${APP_NAME}.app" ]; then
            echo "ERROR: .app not found, cannot create DMG"
            exit 1
          fi
          cp -R "export/${APP_NAME}.app" "${STAGING_DIR}/"
          ln -s /Applications "${STAGING_DIR}/Applications"
          hdiutil create -volname "PDF Converter" -srcfolder "${STAGING_DIR}" -ov -format UDZO "${DMG_NAME}"
          ls -lh "${DMG_NAME}"

      - name: Upload DMG to Release
        if: always() && !cancelled()
        uses: softprops/action-gh-release@v2
        with:
          files: "PDFConverter-*.dmg"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}